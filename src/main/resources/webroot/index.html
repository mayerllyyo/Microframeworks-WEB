<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Framework Demo</title>
    <link rel="stylesheet" href="/styles/app.css">
</head>
<body>
    <div class="container">
        <h1>Web Framework Demo</h1>
        <p>This page is served as a static file by the web framework.</p>

        <section>
            <h2>REST Services</h2>

            <div class="form-group">
                <label for="nameInput">Enter your name:</label>
                <input type="text" id="nameInput" placeholder="e.g. Pedro">
                <button onclick="sayHello()">Say Hello</button>
            </div>
            <p id="helloResult" class="result"></p>

            <div class="form-group">
                <button onclick="getPi()">Get &pi; (Pi)</button>
            </div>
            <p id="piResult" class="result"></p>
        </section>
    </div>
    <script src="/scripts/app.js"></script>
</body>
</html>
